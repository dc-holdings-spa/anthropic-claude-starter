name: anatomist-lint

on:
  pull_request:
    paths:
      - 'src/**'
      - 'agents/**'
      - '.claude/**'
      - 'scripts/anatomist-lint.py'
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/ scripts/

      - name: Anatomist anti-pattern lint
        run: python scripts/anatomist-lint.py .
        # Exit 1 si hay critical o major findings → CI fails → PR bloqueado
